name = "phoenix-ob1-system"
main = "src/reincarnate.js"
compatibility_date = "2024-04-01"
# nodejs_compat removed — using Web APIs only (crypto, fetch, WebSocket)

[vars]
WORKER_VERSION = "v136-PRODUCTION-HARDENED"
DEPLOYED_AT = "2026-03-10T14:00:00Z"
CHAOS_LEVEL = "OFF"
CANONICAL_WORKER_URL = "phoenix-ob1-system.mrmichaelhobbs1234.workers.dev"
ALLOWED_ORIGINS = "https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev"
# BUNDLE_HASH injected by CI: wrangler deploy --var BUNDLE_HASH:$(sha256sum dist/index.js | awk '{print $1}')

# SECRETS (set via: wrangler secret put <NAME>)
# SOVEREIGN_KEY     — sovereign auth token
# CHAT_KEY          — student/operator chat access
# GITHUB_TOKEN      — B3 knowledge mining (blocks B3 until set)
# DEEPGRAM_API_KEY  — STT voice pipeline
# SRCSHA256         — bundle integrity (set by CI after deploy)

[[kv_namespaces]]
binding = "SOUL_DNA"
id = "bb3288a0ddf34b1db1943dcd6380e801"
preview_id = "919cda5ddb544a7090ca33de4373677e"

# DURABLE OBJECTS
# ⚠️ MIGRATION TAGS ARE SACRED — DO NOT RENUMBER OR RENAME
# Renaming destroys DO SQLite storage on redeploy.

[[durable_objects.bindings]]
name = "LEDGER"
class_name = "LedgerDO"

[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionDO"

[[durable_objects.bindings]]
name = "STUDENT_PROFILES"
class_name = "StudentProfileDO"

[[durable_objects.bindings]]
name = "RATELIMITER"
class_name = "RateLimiterDO"

[[durable_objects.bindings]]
name = "MEMORY"
class_name = "MemoryDO"

[[migrations]]
tag = "v1-genesis"
new_sqlite_classes = ["SessionDO"]

[[migrations]]
tag = "v2-student-profiles"
new_sqlite_classes = ["StudentProfileDO"]

[[migrations]]
tag = "v3-ledger-physics"
new_sqlite_classes = ["LedgerDO"]

[[migrations]]
tag = "v4-rate-limiter"
new_sqlite_classes = ["RateLimiterDO"]

[[migrations]]
tag = "v5-memory-do"
new_sqlite_classes = ["MemoryDO"]
