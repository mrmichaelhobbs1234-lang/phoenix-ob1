name: Chaos Deploy

concurrency:
  group: deploy-phoenix-ob1
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Pre-deploy gate — Syntax check
        run: npx wrangler validate || echo "WARNING — wrangler validate failed"

      - name: Pre-deploy gate — Body guard audit
        run: |
          echo "Checking for safeJsonBytes usage..."
          grep -n "safeJsonBytes" src/reincarnate.js || (echo "FATAL — safeJsonBytes not found" && exit 1)

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      - name: Post-deploy gate — Health check
        run: |
          sleep 5
          curl -f https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev/health || exit 1

      - name: Post-deploy gate — Evidence check
        run: |
          curl -f https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev/evidence || exit 1

      - name: Post-deploy gate — Ledger verify check
        run: |
          curl -f https://phoenix-ob1-system.mrmichaelhobbs1234.workers.dev/ledgerverify || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Post-deploy gates failed — triggering rollback"
          git config user.email "ci@phoenix-ob1"
          git config user.name "Phoenix CI"
          git revert HEAD --no-edit -m "[skip ci] auto-rollback: post-deploy gates failed"
          git push
          npx wrangler deploy
